# Сборка и публикация ландшафта на GitHub Pages.
# ЧЕРНОВИК: шаг установки landscape2 нужно сверить с актуальной документацией
# https://github.com/cncf/landscape2 перед первым запуском.
name: Deploy landscape

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install landscape2
        run: cargo install landscape2

      - name: Build
        run: |
          landscape2 build \
            --data-file data/landscape.yml \
            --settings-file data/settings.yml \
            --logos-path logos \
            --output-dir build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
