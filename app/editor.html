<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Редактор разметки · Ландшафт технологий 1С</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="editor.css?v=2">
</head>
<body>
  <header class="masthead">
    <div class="masthead__main">
      <p class="kicker">Редактор · разметка · локально</p>
      <h1 class="title">Редактор разметки</h1>
      <p class="lede">Проставляй метки кликами по&nbsp;чипам, правь карточки и&nbsp;экспортируй в&nbsp;<b>data.js</b>. Без правки JSON руками.</p>
    </div>
  </header>

  <section class="editbar">
    <div class="editbar__status">
      <span id="progress" class="count"></span>
      <span id="saved" class="saved"></span>
    </div>
    <div class="editbar__actions">
      <input id="search" type="search" placeholder="Поиск…" autocomplete="off" spellcheck="false">
      <button id="add" class="btn">+ Карточка</button>
      <label class="btn" title="Загрузить ранее экспортированный data.js/JSON">Импорт<input id="import" type="file" accept=".js,.json" hidden></label>
      <button id="reset" class="btn" title="Очистить автосохранение и вернуть исходные данные">Сбросить</button>
      <button id="copy" class="btn">Скопировать</button>
      <button id="export" class="btn btn--primary">Экспорт data.js</button>
    </div>
  </section>

  <main class="layout layout--editor">
    <div id="board" class="board"></div>
    <p id="empty" class="empty" hidden>Ничего не найдено.</p>
  </main>

  <dialog id="edit" class="detail edit"></dialog>
  <div id="toast" class="toast" hidden></div>

  <script src="data.generated.js"></script>
  <script src="editor.js"></script>
</body>
</html>
