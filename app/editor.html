<!doctype html>
<html lang="ru" data-theme="light">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Редактор разметки · Ландшафт 1С</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css?v=64fb57fc" />
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <link rel="stylesheet" href="editor.css?v=6086fe13" />
    </head>
    <body>
        <div class="topbar" id="topbar">
            <span class="topbar__brand">Редактор</span>
            <div class="topbar__search">
                <input
                    id="search2"
                    type="search"
                    placeholder="Поиск…"
                    autocomplete="off"
                    spellcheck="false"
                />
            </div>
            <button
                id="save2"
                class="btn btn--primary"
                title="Записать прямо в app/data.js"
            >
                Сохранить
            </button>
            <a class="btn" href="./" target="_blank">Сайт ↗</a>
        </div>

        <header class="masthead masthead--editor">
            <div class="masthead__main">
                <p class="kicker">Редактор · разметка · локально</p>
                <h1 class="title">Редактор разметки</h1>
            </div>
            <div class="masthead__actions">
                <button
                    id="save"
                    class="btn btn--primary"
                    title="Записать прямо в app/data.js"
                >
                    Сохранить
                </button>
                <a class="btn" href="./" target="_blank">Сайт ↗</a>
            </div>
        </header>

        <section class="editbar">
            <div class="editbar__status">
                <span id="saved" class="saved"></span>
            </div>
            <div class="editbar__actions">
                <input
                    id="search"
                    type="search"
                    placeholder="Поиск…"
                    autocomplete="off"
                    spellcheck="false"
                />
                <button id="add" class="btn">+ Карточка</button>
                <button
                    id="export"
                    class="btn"
                    title="Скачать копию (запасной путь)"
                >
                    Экспорт
                </button>
                <button
                    id="build"
                    class="btn"
                    title="Версии ассетов + проверка данных + сборка dist/"
                >
                    Собрать dist
                </button>
            </div>
        </section>

        <main class="layout layout--editor">
            <div id="board" class="board"></div>
            <p id="empty" class="empty" hidden>Ничего не найдено</p>
        </main>

        <dialog id="edit" class="detail edit"></dialog>
        <div id="toast" class="toast" hidden></div>

        <script src="data.js?v=b1f26312"></script>
        <script src="shared.js?v=4eef8a86"></script>
        <script src="editor.js?v=ab704961"></script>
    </body>
</html>
