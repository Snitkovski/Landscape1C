<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Граф связей · Ландшафт технологий 1С</title>
        <script>
            (function () {
                try {
                    var t = localStorage.getItem("theme");
                    if (!t)
                        t = matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light";
                    document.documentElement.dataset.theme = t;
                } catch (e) {}
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css?v=113" />
    </head>
    <body class="page-graph">
        <div class="topbar" id="topbar">
            <span class="topbar__brand"
                ><a
                    href="index.html"
                    style="text-decoration: none; color: inherit"
                    >Ландшафт</a
                ></span
            >
            <span
                class="topbar__search"
                style="font-size: 13px; color: #999; cursor: pointer"
                >Граф</span
            >
            <button
                class="graph-ftrigger"
                type="button"
                aria-expanded="false"
                aria-controls="graph-filters"
            >
                Отборы
            </button>
            <button
                class="theme-toggle"
                type="button"
                aria-label="Переключить тему"
            >
                <svg
                    class="i-moon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
                </svg>
                <svg
                    class="i-sun"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <circle cx="12" cy="12" r="4" />
                    <path
                        d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"
                    />
                </svg>
            </button>
        </div>

        <header class="masthead">
            <div class="masthead__main">
                <p class="kicker">
                    <a href="index.html" class="back">← Ландшафт</a>
                </p>
                <h1 class="title">Граф связей</h1>
            </div>
            <button
                class="theme-toggle"
                type="button"
                aria-label="Переключить тему"
            >
                <svg
                    class="i-moon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
                </svg>
                <svg
                    class="i-sun"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <circle cx="12" cy="12" r="4" />
                    <path
                        d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"
                    />
                </svg>
            </button>
        </header>

        <div class="graph-filters" id="graph-filters">
            <div class="graph-fgroup">
                <span class="graph-flabel">Роль</span>
                <div class="chips" id="f-role"></div>
            </div>
            <div class="graph-fgroup">
                <span class="graph-flabel">Зрелость</span>
                <div class="chips" id="f-maturity"></div>
            </div>
        </div>

        <div class="graph">
            <canvas id="graph"></canvas>
            <div class="graph__legend">
                <p class="graph__legend-title">Блоки</p>
                <ul id="legend"></ul>
            </div>
            <div class="graph__hint" id="graph-hint"></div>
            <div class="graph__zoom">
                <button id="zoom-in" type="button" aria-label="Приблизить">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        aria-hidden="true"
                    >
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                </button>
                <button id="zoom-out" type="button" aria-label="Отдалить">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        aria-hidden="true"
                    >
                        <path d="M5 12h14" />
                    </svg>
                </button>
            </div>
            <button
                class="graph__expand"
                id="graph-expand"
                type="button"
                aria-label="Развернуть на весь экран"
            >
                <svg
                    class="i-expand"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"
                    />
                </svg>
                <svg
                    class="i-collapse"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path
                        d="M9 3v3a2 2 0 0 1-2 2H4M15 3v3a2 2 0 0 0 2 2h3M9 21v-3a2 2 0 0 0-2-2H4M15 21v-3a2 2 0 0 1 2-2h3"
                    />
                </svg>
            </button>
        </div>

        <footer class="foot">
            <nav class="foot__links"></nav>
        </footer>

        <dialog id="detail" class="detail">
            <div class="detail__body"></div>
        </dialog>

        <script src="data.js?v=99"></script>
        <script src="detail.js?v=4"></script>
        <script src="nav.js?v=3"></script>
        <script src="graph.js?v=11"></script>
        <script>
            document.querySelectorAll(".theme-toggle").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    var next =
                        document.documentElement.dataset.theme === "dark"
                            ? "light"
                            : "dark";
                    document.documentElement.dataset.theme = next;
                    try {
                        localStorage.setItem("theme", next);
                    } catch (e) {}
                });
            });
            var topbar = document.getElementById("topbar");
            var mast = document.querySelector(".masthead");
            var foot = document.querySelector(".foot");
            function onScroll() {
                topbar.classList.toggle(
                    "is-visible",
                    window.scrollY > mast.offsetHeight - 10,
                );
                foot.classList.toggle(
                    "is-full",
                    window.innerHeight + window.scrollY >=
                        document.documentElement.scrollHeight - 2,
                );
            }
            addEventListener("scroll", onScroll, { passive: true });
            addEventListener("resize", onScroll);
            onScroll();

            // Клик по названию страницы в слепленной строке — плавно наверх
            document
                .querySelector(".topbar__search")
                .addEventListener("click", function () {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
        </script>
    </body>
</html>
