<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Граф связей · Ландшафт технологий 1С</title>
        <script>
            (function () {
                try {
                    var t = localStorage.getItem("theme");
                    if (!t)
                        t = matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light";
                    document.documentElement.dataset.theme = t;
                } catch (e) {}
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css?v=cf464153" />
    </head>
    <body class="page-graph">
        <div class="topbar" id="topbar">
            <span class="topbar__brand"
                ><a
                    href="index.html"
                    style="text-decoration: none; color: inherit"
                    >Ландшафт</a
                ></span
            >
            <span
                class="topbar__search"
                style="font-size: 13px; color: #999; cursor: pointer"
                >Граф</span
            >
            <button
                class="graph-ftrigger"
                type="button"
                aria-expanded="false"
                aria-controls="graph-filters"
            >
                Отборы
            </button>
        </div>

        <header class="masthead">
            <div class="masthead__main">
                <p class="kicker">
                    <a href="index.html" class="back">← Ландшафт</a>
                </p>
                <h1 class="title">Граф связей</h1>
            </div>
        </header>

        <div class="graph-filters" id="graph-filters">
            <div class="graph-fgroup">
                <span class="graph-flabel">Роль</span>
                <div class="chips" id="f-role"></div>
            </div>
            <div class="graph-fgroup">
                <span class="graph-flabel">Зрелость</span>
                <div class="chips" id="f-maturity"></div>
            </div>
        </div>

        <div class="graph">
            <canvas id="graph"></canvas>
            <div class="graph__legend">
                <p class="graph__legend-title">Блоки</p>
                <ul id="legend"></ul>
            </div>
            <div class="graph__hint" id="graph-hint"></div>
            <div class="graph__zoom">
                <button id="zoom-in" type="button" aria-label="Приблизить">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        aria-hidden="true"
                    >
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                </button>
                <button id="zoom-out" type="button" aria-label="Отдалить">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        aria-hidden="true"
                    >
                        <path d="M5 12h14" />
                    </svg>
                </button>
            </div>
            <button
                class="graph__expand"
                id="graph-expand"
                type="button"
                aria-label="Развернуть на весь экран"
            >
                <svg
                    class="i-expand"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"
                    />
                </svg>
                <svg
                    class="i-collapse"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path
                        d="M9 3v3a2 2 0 0 1-2 2H4M15 3v3a2 2 0 0 0 2 2h3M9 21v-3a2 2 0 0 0-2-2H4M15 21v-3a2 2 0 0 1 2-2h3"
                    />
                </svg>
            </button>
        </div>

        <footer class="foot">
            <nav class="foot__links"></nav>
        </footer>

        <dialog id="detail" class="detail">
            <div class="detail__body"></div>
        </dialog>

        <script src="data.js?v=c574c919"></script>
        <script src="shared.js?v=74d15dd8"></script>
        <script src="detail.js?v=2776cb81"></script>
        <script src="nav.js?v=ab232837"></script>
        <script src="graph.js?v=746ae0f2"></script>
    </body>
</html>
