<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Схема · Ландшафт технологий 1С</title>
        <script>
            (function () {
                try {
                    var t = localStorage.getItem("theme");
                    if (!t)
                        t = matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light";
                    document.documentElement.dataset.theme = t;
                } catch (e) {}
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css?v=cf464153" />
    </head>
    <body class="page-doc page-scheme">
        <div class="topbar" id="topbar">
            <span class="topbar__brand"
                ><a
                    href="index.html"
                    style="text-decoration: none; color: inherit"
                    >Ландшафт</a
                ></span
            >
            <span
                class="topbar__search"
                style="font-size: 13px; color: #999; cursor: pointer"
                >Схема</span
            >
            <button
                class="graph-ftrigger scheme-ftrigger"
                id="topbar-ftrigger"
                type="button"
                aria-expanded="false"
                aria-controls="scheme-toggles"
            >
                Отборы
            </button>
            <button id="reset2" class="reset" hidden>Сбросить ✕</button>
            <div class="scheme-dd" id="topbar-dl"></div>
        </div>

        <header class="masthead">

                <p class="kicker">
                    <a href="index.html" class="back">← Ландшафт</a>
                </p>

            </div>
        </header>

        <div class="scheme-bar">
            <div class="scheme-toggles" id="scheme-toggles"></div>
            <div class="scheme-actions">
                <div class="scheme-dd" id="bar-dl"></div>
            </div>
        </div>

        <div class="scheme-wrap" id="scheme-wrap"></div>

        <footer class="foot">
            <nav class="foot__links"></nav>
        </footer>

        <dialog id="detail" class="detail">
            <div class="detail__body"></div>
