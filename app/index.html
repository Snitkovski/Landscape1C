<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ландшафт технологий 1С</title>
  <script>
    // Тема до отрисовки — чтобы не мигало. Сохранённый выбор > системная настройка.
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=27">
</head>
<body>
  <div class="topbar" id="topbar">
    <span class="topbar__brand">Ландшафт</span>
    <div class="topbar__search">
      <input id="search2" type="search" placeholder="Поиск инструмента…" autocomplete="off" spellcheck="false">
    </div>
    <button class="theme-toggle" type="button" aria-label="Переключить тему">
      <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
    </button>
  </div>

  <header class="masthead">
    <div class="masthead__main">
      <p class="kicker">Интерактивная карта · стек 1С</p>
      <h1 class="title">Ландшафт технологий 1С</h1>
      <div class="search">
        <input id="search" type="search" placeholder="Поиск инструмента…" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <button class="theme-toggle" type="button" aria-label="Переключить тему">
      <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
    </button>
    <!-- Декоративный счётчик. Статичный: app.js обновляет только #count в строке ниже. -->
    <div class="masthead__num" aria-hidden="true">77</div>
  </header>

  <section class="kits" aria-label="Стартовые наборы по контексту">
    <span class="kits__label">Старт</span>
    <div id="kits" class="kits__row"></div>
  </section>

  <div class="body">
    <aside class="filters" id="filters" aria-label="Фильтры"></aside>

    <main class="content">
      <div class="content__bar">
        <span id="count" class="count"></span>
        <button id="reset" class="reset" hidden>Сбросить ✕</button>
      </div>
      <div id="board" class="board"></div>
      <div id="empty" class="empty" hidden>
        <p class="empty__title">Мы не нашли таких инструментов.</p>
        <p class="empty__text">Расскажите, чем пользуетесь сами — это поможет дополнить ландшафт. Письмо уже частично заполнено: остаётся вписать ваши инструменты.</p>
        <a id="empty-mail" class="empty__btn" href="mailto:aripovn@gmail.com">Написать на aripovn@gmail.com</a>
      </div>
    </main>
  </div>

  <footer class="foot">
    <!-- Позже: Поддержать, Экспертный совет и др. -->
  </footer>

  <dialog id="detail" class="detail">
    <div class="detail__body"></div>
  </dialog>

  <script src="data.js?v=46"></script>
  <script src="app.js?v=26"></script>
  <script>
    // ── Переключение темы (обе кнопки) ──
    document.querySelectorAll(".theme-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        try { localStorage.setItem("theme", next); } catch (e) {}
      });
    });

    // ── Свёрнутая строка появляется после прокрутки за хедер ──
    var topbar = document.getElementById("topbar");
    var mast = document.querySelector(".masthead");
    function onScroll() {
      topbar.classList.toggle("is-visible", window.scrollY > mast.offsetHeight - 10);
    }
    addEventListener("scroll", onScroll, { passive: true });
    onScroll();

    // ── Два поля поиска синхронизированы; фильтрацию ведёт app.js (#search) ──
    var s1 = document.getElementById("search");
    var s2 = document.getElementById("search2");
    s2.addEventListener("input", function () {
      s1.value = s2.value;
      s1.dispatchEvent(new Event("input", { bubbles: true }));
    });
    s1.addEventListener("input", function () { s2.value = s1.value; });
  </script>
</body>
</html>
