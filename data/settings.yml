# Настройки сайта landscape2 — MVP.
# Полная схема: https://github.com/cncf/landscape2/blob/main/docs/config/settings.yml

foundation: Технологии 1С
url: https://oxotka.github.io/Landscape1C
# base_path нужен только для публикации на GitHub Pages (проектный сайт под /Landscape1C/).
# Локально он ломает маршрутизацию (404), поэтому добавим его на этапе деплоя.
# base_path: /Landscape1C/

colors:
  color1: "rgba(28, 78, 140, 1)"
  color2: "rgba(54, 116, 181, 1)"
  color3: "rgba(240, 160, 40, 1)"
  color4: "rgba(120, 140, 165, 1)"
  color5: "rgba(64, 160, 100, 1)"
  color6: "rgba(77, 77, 77, 1)"
  color7: "rgba(240, 243, 247, 1)"

# Порядок категорий и подкатегорий (должны совпадать с landscape.yml).
categories:
  - name: IDE
    subcategories:
      - Среды разработки
  - name: CI/CD
    subcategories:
      - Сборка и доставка
  - name: Системы хранения версий
    subcategories:
      - Версионирование
