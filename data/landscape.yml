# Данные ландшафта технологий 1С — MVP.
# Категории: IDE, CI/CD, Системы хранения версий.
# Логотипы — общая заглушка logos/placeholder.svg (заменим позже).
# Доменные метки (maturity/roles/contexts/origin/license_type) — в extra; размечены «на глаз».

landscape:
  - name: IDE
    subcategories:
      - name: Среды разработки
        items:
          - name: Конфигуратор
            description: Классическая среда разработки, входящая в состав платформы 1С:Предприятие.
            homepage_url: https://v8.1c.ru/platforma/
            logo: placeholder.svg
            extra:
              maturity: базовое
              roles: разработчик
              contexts: франчайзи, инхаус, продукты, проекты, фриланс
              origin: отечественное
              license_type: проприетарное
              why: Базовая среда, с которой начинает почти каждый разработчик 1С.
          - name: 1C:Enterprise Development Tools (EDT)
            description: Современная среда разработки 1С на базе Eclipse.
            homepage_url: https://edt.1c.ru
            logo: placeholder.svg
            extra:
              maturity: продвинутое
              roles: разработчик
              contexts: инхаус, продукты, проекты
              origin: отечественное
              license_type: проприетарное
              why: Современный инструментарий, git-ориентированная разработка, рефакторинг.
          - name: Visual Studio Code (VSCode)
            description: Лёгкий кроссплатформенный редактор кода для около-1С технологий.
            homepage_url: https://code.visualstudio.com
            logo: placeholder.svg
            extra:
              maturity: продвинутое
              roles: разработчик, devops
              contexts: продукты, инхаус, фриланс
              origin: зарубежное
              license_type: open-source
              why: Удобен для OneScript, Vanessa и просмотра модулей; много расширений.

  - name: CI/CD
    subcategories:
      - name: Сборка и доставка
        items:
          - name: Jenkins
            description: Сервер автоматизации сборок и пайплайнов.
            homepage_url: https://www.jenkins.io
            repo_url: https://github.com/jenkinsci/jenkins
            logo: placeholder.svg
            extra:
              maturity: продвинутое
              roles: devops
              contexts: продукты, инхаус
              origin: зарубежное
              license_type: open-source
              why: Классика CI для сборки и прогона тестов 1С.
          - name: GitLab CI
            description: Встроенная в GitLab система непрерывной интеграции.
            homepage_url: https://docs.gitlab.com/ee/ci/
            logo: placeholder.svg
            extra:
              maturity: продвинутое
              roles: devops
              contexts: продукты, инхаус
              origin: зарубежное
              license_type: open-source
              why: CI/CD рядом с репозиторием, без отдельного сервера сборки.
          - name: Vagrant
            description: Инструмент управления воспроизводимыми виртуальными окружениями.
            homepage_url: https://www.vagrantup.com
            repo_url: https://github.com/hashicorp/vagrant
            logo: placeholder.svg
            extra:
              maturity: нишевое
              roles: devops
              contexts: продукты, инхаус
              origin: зарубежное
              license_type: open-source
              why: Быстрое поднятие одинаковых тестовых стендов 1С.
          - name: Docker
            description: Платформа контейнеризации приложений и окружений.
            homepage_url: https://www.docker.com
            repo_url: https://github.com/moby/moby
            logo: placeholder.svg
            extra:
              maturity: продвинутое
              roles: devops
              contexts: продукты, инхаус
              origin: зарубежное
              license_type: open-source
              why: Изолированные окружения для сборки, тестов и сервисов вокруг 1С.
          - name: Allure
            description: Фреймворк формирования наглядных отчётов о тестировании.
            homepage_url: https://allurereport.org
            repo_url: https://github.com/allure-framework/allure2
            logo: placeholder.svg
            extra:
              maturity: нишевое
              roles: devops, тестировщик
              contexts: продукты
              origin: зарубежное
              license_type: open-source
              why: Читаемые отчёты по результатам автотестов в пайплайне.

  - name: Системы хранения версий
    subcategories:
      - name: Версионирование
        items:
          - name: git
            description: Распределённая система контроля версий — индустриальный стандарт.
            homepage_url: https://git-scm.com
            logo: placeholder.svg
            extra:
              maturity: базовое
              roles: разработчик, devops
              contexts: продукты, инхаус, проекты, фриланс
              origin: зарубежное
              license_type: open-source
              why: Стандарт версионирования; основа CI/CD и командной работы.
          - name: Хранилище конфигурации
            description: Штатный механизм платформы для совместной разработки.
            homepage_url: https://its.1c.ru
            logo: placeholder.svg
            extra:
              maturity: устаревает
              roles: разработчик
              contexts: франчайзи, инхаус
              origin: отечественное
              license_type: проприетарное
              why: Постепенно вытесняется связкой git + выгрузка конфигурации в файлы.
