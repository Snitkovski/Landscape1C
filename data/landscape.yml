# Данные ландшафта технологий 1С.
# Черновик: несколько примеров элементов для запуска MVP.
# Полное наполнение — миграцией из README исходного каталога (см. docs/TZ.md, п.6).
#
# ВНИМАНИЕ: поля logo ссылаются на файлы в каталоге logos/, которых пока нет —
# перед реальной сборкой добавьте SVG-логотипы или уберите элементы без логотипа.

landscape:
  - category: Разработка
    subcategories:
      - subcategory: Языки программирования
        items:
          - item:
              name: Встроенный язык 1С:Предприятия (BSL)
              description: Основной язык разработчика 1С для описания алгоритмов прикладной задачи.
              homepage_url: https://v8.1c.ru/platforma/
              logo: bsl.svg
              extra:
                maturity: базовое
                roles: [разработчик]
                origin: отечественное
                license_type: проприетарное
                why: Основной инструмент программиста 1С — большая часть работы делается на нём.
          - item:
              name: OneScript
              description: Кроссплатформенный движок исполнения скриптов на языке 1С вне платформы.
              homepage_url: https://oscript.io
              repo_url: https://github.com/EvilBeaver/OneScript
              logo: onescript.svg
              extra:
                maturity: продвинутое
